{#
 # keyrad.yaml - generated by OPNsense, manual changes will be overwritten.
 #}
{% if helpers.exists('OPNsense.Keyrad.general') %}
{% set general = OPNsense.Keyrad.general %}
token_url: "{{ general.token_url }}"
api_url: "{{ general.api_url }}"
realm: "{{ general.realm }}"
client_id: "{{ general.client_id }}"
client_secret: "{{ general.client_secret }}"
insecure_skip_tls_verify: {{ 'true' if general.insecure_skip_tls_verify|default('0') == '1' else 'false' }}
otp_challenge_message: "{{ general.otp_challenge_message|default('Please enter your OTP code') }}"
listen_addr: "{{ general.listen_address|default('0.0.0.0') }}:{{ general.listen_port|default('1812') }}"
{% set rows = [] %}
{% if helpers.exists('OPNsense.Keyrad.mappings.mapping') %}
{% for m in helpers.toList('OPNsense.Keyrad.mappings.mapping') %}
{% if m.enabled|default('0') == '1' %}
{% do rows.append(m) %}
{% endif %}
{% endfor %}
{% endif %}
{% if rows %}

scope_radius_map:
{% for scope, items in rows|groupby('scope') %}
  "{{ scope }}":
{% for m in items %}
{% if m.vendor is defined and m.vendor != '' and m.vendor != '0' %}
    - vendor: {{ m.vendor }}
      attribute: {{ m.attribute }}
{% else %}
    - attribute: {{ m.attribute }}
{% endif %}
      value: "{{ m.value }}"
      value_type: {{ m.value_type|default('string') }}
{% endfor %}
{% endfor %}
{% endif %}
{% endif %}
