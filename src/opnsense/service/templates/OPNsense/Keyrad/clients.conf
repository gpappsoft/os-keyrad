{#
 # clients.conf - generated by OPNsense, manual changes will be overwritten.
 #}
# FreeRADIUS-style RADIUS client definitions managed by OPNsense.
{% if helpers.exists('OPNsense.Keyrad.clients.client') %}
{% for client in helpers.toList('OPNsense.Keyrad.clients.client') %}
{% if client.enabled|default('0') == '1' %}

client {{ client.network }} {
    secret = {{ client.secret }}
{% if client.shortname|default('') != '' %}
    shortname = {{ client.shortname }}
{% endif %}
}
{% endif %}
{% endfor %}
{% endif %}
