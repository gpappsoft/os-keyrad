[start]
command:/usr/local/etc/rc.d/keyrad onestart
parameters:
type:script
message:starting keyrad

[stop]
command:/usr/local/etc/rc.d/keyrad onestop
parameters:
type:script
message:stopping keyrad

[restart]
command:/usr/local/etc/rc.d/keyrad onerestart
parameters:
type:script
message:restarting keyrad

[status]
command:/usr/local/etc/rc.d/keyrad onestatus
parameters:
type:script_output
message:get keyrad status
